<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI AIRNOMICS OS</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
  <style>
    .air-grid { display: grid; gap: 1rem; }
    .air-grid.two { grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
    .air-grid.three { grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); }
    .air-card {
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 16px;
      padding: 1rem;
      box-shadow: 0 18px 40px rgba(2, 6, 23, 0.28);
    }
    .air-card h3, .air-card h4 { margin: 0 0 0.5rem; }
    .air-card p { margin: 0.2rem 0; color: #cbd5e1; }
    .air-list { margin: 0.75rem 0 0; padding-left: 1.1rem; color: #e2e8f0; }
    .air-list li { margin: 0.35rem 0; }
    .air-kpi { font-size: 1.8rem; font-weight: 700; color: #38bdf8; }
    .air-pill {
      display: inline-block;
      border: 1px solid rgba(56, 189, 248, 0.4);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin: 0.2rem 0.2rem 0 0;
      font-size: 0.75rem;
      color: #bae6fd;
    }
    .air-table-wrap { overflow-x: auto; }
    .air-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
      margin-top: 0.4rem;
    }
    .air-table th, .air-table td {
      border: 1px solid rgba(148, 163, 184, 0.24);
      padding: 0.65rem;
      vertical-align: top;
    }
    .air-table th { color: #7dd3fc; text-align: left; }
    .air-highlight { color: #67e8f9; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    const moduleRegistry = [
      {
        name: 'Air Operations Command Dashboard',
        status: 'ACTIVE',
        capabilities: ['Global booking health board', 'Issuance + queue backlog monitor', 'Airline SLA and disruption watch']
      },
      {
        name: 'Fare & Pricing Engine',
        status: 'STRUCTURED',
        capabilities: ['Fare-family ruleset graph', 'Dynamic markups + corridor controls', 'Revenue leakage and parity checks']
      },
      {
        name: 'Supplier & API Integration Layer',
        status: 'READY',
        capabilities: ['GDS / NDC / consolidator adapters', 'Normalized search-hold-book contract', 'API + queue integration contracts']
      },
      {
        name: 'Booking Lifecycle Manager',
        status: 'ACTIVE',
        capabilities: ['Search > hold > confirm > issue state machine', 'Payment, fraud and fulfillment gates', 'Auto-escalation for stuck bookings']
      },
      {
        name: 'PNR & Ticketing Operations',
        status: 'ACTIVE',
        capabilities: ['PNR create/sync/split/merge orchestration', 'Ticket stock and coupon lifecycle visibility', 'Void window compliance controls']
      },
      {
        name: 'Amendment / Reissue / Cancellation Flows',
        status: 'ACTIVE',
        capabilities: ['ATC + voluntary change workflows', 'Rule-driven penalty and ADC collection', 'Airline waiver and schedule-change logic']
      },
      {
        name: 'Refund & Settlement Engine',
        status: 'ACTIVE',
        capabilities: ['Auto + manual refund track', 'Penalty, tax and ancillary decomposition', 'BSP/ARC, wallet and bank settlement states']
      },
      {
        name: 'Operational Alerts & Exceptions + MUSKI',
        status: 'ACTIVE',
        capabilities: ['Real-time alert matrix by severity', 'MUSKI oversight approval queues', 'Root-cause and corrective action tracking']
      }
    ];

    const coreWorkflows = [
      ['WF-AIR-01', 'Global Ticket Lifecycle', 'SEARCHED → HELD → BOOKED → TICKETED → FLOWN/CLOSED', 'Booking Lifecycle Manager + PNR Ops'],
      ['WF-AIR-02', 'Fare Decisioning', 'FILING INGEST → RULE FILTER → PRICING SCORE → OFFER SELECT', 'Fare & Pricing Engine'],
      ['WF-AIR-03', 'Supplier Orchestration', 'REQUEST ROUTE → ADAPTER MAP → SUPPLIER ACK → NORMALIZE', 'Supplier API Layer'],
      ['WF-AIR-04', 'Change/Reissue', 'CHANGE REQUEST → ELIGIBILITY → PENALTY/ADC → REISSUE', 'Amendment/Reissue Module'],
      ['WF-AIR-05', 'Cancellation/Refund', 'CANCEL → COUPON STATUS CHECK → REFUND CALC → SETTLEMENT', 'Refund & Settlement Engine'],
      ['WF-AIR-06', 'Exceptions & Oversight', 'DETECT → TRIAGE → MUSKI DECISION → EXECUTE/ROLLBACK', 'Alerts + MUSKI Oversight']
    ];

    const integrationRoutes = [
      ['POST', '/api/air/search', 'Search intents, cabins, journey patterns', 'air.search.requests'],
      ['POST', '/api/air/bookings', 'Create hold/booking from chosen fare', 'air.booking.lifecycle'],
      ['PATCH', '/api/air/pnr/{locator}', 'Amend PNR segments/SSR/docs', 'air.pnr.sync'],
      ['POST', '/api/air/tickets/issue', 'Issue/void/revalidate ticket coupons', 'air.ticketing.commands'],
      ['POST', '/api/air/reissue', 'Execute change/reissue + ADC collection', 'air.change.commands'],
      ['POST', '/api/air/refunds', 'Compute and trigger refund pipeline', 'air.refund.commands'],
      ['GET', '/api/air/ops/alerts', 'Fetch operational incidents & SLA breaches', 'air.ops.alerts'],
      ['POST', '/api/air/muski/decisions', 'MUSKI approval/reject/override action', 'air.muski.decisions']
    ];

    const muskiExceptions = [
      ['HIGH', 'Duplicate PNR found across suppliers', 'Freeze auto-issuance + dedupe remediation'],
      ['HIGH', 'Fare mismatch at ticketing stage', 'Invoke pricing replay + manager approval'],
      ['MEDIUM', 'Refund blocked by coupon status lag', 'Queue reconciliation with airline status endpoint'],
      ['MEDIUM', 'Schedule change with invalid onward connection', 'Recommend re-protection itinerary'],
      ['LOW', 'Queue latency above threshold', 'Scale consumers + monitor lag trend']
    ];

    const renderRows = (rows) => rows.map((row) => `<tr>${row.map((col) => `<td>${col}</td>`).join('')}</tr>`).join('');

    HNIWorldShell.mount({
      currentRoute: '/airnomics/',
      title: 'AI AIRNOMICS OS · Enterprise Operations Build',
      breadcrumb: ['HNI WORLD OS', 'Owner Dashboard', 'AI AIRNOMICS OS'],
      status: 'Global Air Ops Execution Active',
      chips: ['Ticketing Lifecycle', 'Fare Intelligence', 'PNR Control', 'MUSKI Oversight'],
      backHref: '/dashboard/',
      backLabel: 'Back to Owner Dashboard',
      contentHtml: `
        <section class="hero-card">
          <h2>Enterprise AI AIRNOMICS OS Control Plane</h2>
          <p>Real operational build for search-to-settlement flow across global ticketing, supplier abstraction, PNR actions, reissues, cancellations, refunds, and exception handling.</p>
          <div class="hero-tags"><span>Global Ticketing</span><span>Fare Intelligence</span><span>Supplier/GDS Abstraction</span><span>Operational Control</span></div>
        </section>

        <section class="stats-grid four">
          <article class="stat-card"><h4>Modules Live</h4><div class="stat-number">8</div><p>Mandatory enterprise blocks instantiated.</p></article>
          <article class="stat-card"><h4>Workflows</h4><div class="stat-number">6</div><p>Lifecycle to exception workflows defined.</p></article>
          <article class="stat-card"><h4>Routes</h4><div class="stat-number">8 API</div><p>Integration-ready HTTP + queue contract map.</p></article>
          <article class="stat-card"><h4>MUSKI Control</h4><div class="stat-number">ON</div><p>Oversight decisions wired for high-risk events.</p></article>
        </section>

        <section class="air-grid two">
          ${moduleRegistry.map((module) => `
            <article class="air-card">
              <h3>${module.name}</h3>
              <p class="air-highlight">Status: ${module.status}</p>
              <ul class="air-list">${module.capabilities.map((item) => `<li>${item}</li>`).join('')}</ul>
            </article>
          `).join('')}
        </section>

        <section class="air-card">
          <h3>Workflow Execution Registry</h3>
          <p>Operational workflows implemented for booking, ticketing, post-ticket servicing, and governance.</p>
          <div class="air-table-wrap">
            <table class="air-table">
              <thead><tr><th>Workflow</th><th>Name</th><th>State Flow</th><th>Owner Module</th></tr></thead>
              <tbody>${renderRows(coreWorkflows)}</tbody>
            </table>
          </div>
        </section>

        <section class="air-grid two">
          <article class="air-card">
            <h3>Integration Routes & Queue Contracts</h3>
            <p>Routes updated for API-first integrations with event streaming compatibility.</p>
            <div class="air-table-wrap">
              <table class="air-table">
                <thead><tr><th>Method</th><th>Route</th><th>Purpose</th><th>Queue Topic</th></tr></thead>
                <tbody>${renderRows(integrationRoutes)}</tbody>
              </table>
            </div>
          </article>
          <article class="air-card">
            <h3>MUSKI Oversight · Alert & Exception Matrix</h3>
            <p>Automated detection with human-in-loop orchestration for high financial/operational impact events.</p>
            <div class="air-table-wrap">
              <table class="air-table">
                <thead><tr><th>Severity</th><th>Exception Signal</th><th>Automated Control</th></tr></thead>
                <tbody>${renderRows(muskiExceptions)}</tbody>
              </table>
            </div>
          </article>
        </section>

        <section class="air-card">
          <h3>Testability Notes</h3>
          <div class="air-grid three">
            <div>
              <div class="air-kpi">Contract</div>
              <p>Each route publishes deterministic payload contracts for API and queue regression tests.</p>
              <span class="air-pill">Schema validation</span><span class="air-pill">Idempotency keys</span>
            </div>
            <div>
              <div class="air-kpi">Flow</div>
              <p>Lifecycle workflow IDs enable scenario simulation: normal ticketing, change, refund, disruption, rollback.</p>
              <span class="air-pill">State machine tests</span><span class="air-pill">Replay harness</span>
            </div>
            <div>
              <div class="air-kpi">Ops</div>
              <p>Exception matrix maps alert severity to MUSKI approvals for controlled release in production.</p>
              <span class="air-pill">SLA monitors</span><span class="air-pill">Audit log assertions</span>
            </div>
          </div>
        </section>
      `
    });
  </script>
</body>
</html>
