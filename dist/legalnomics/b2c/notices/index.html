<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2C Notices</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
<div class="shell-layout">
<aside class="shell-sidebar">
  <div class="shell-brand-card"><h2>AI LEGALNOMICS OS</h2><p>Public legal notice generation workspace.</p></div>
  <div class="shell-nav-group">
    <div class="shell-nav-title">B2C</div>
    <a class="shell-nav-link" href="/legalnomics/b2c">B2C Home</a>
    <a class="shell-nav-link active" href="/legalnomics/b2c/notices">Notices</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/replies">Replies</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/consultation">Consultation</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/notary">Notary</a>
  </div>
</aside>
<main class="shell-main">
  <div class="shell-topbar"><div><h1>Legal Notice Generator</h1><p>HNI WORLD OS > Legalnomics > B2C > Notices</p></div><div class="shell-top-actions"><span class="shell-chip">Entry Draft</span><span class="shell-chip">Affordable</span><span class="shell-chip">Escalation Ready</span></div></div>
  <section class="form-card" style="margin:22px;">
    <h3>Create Notice Request</h3>
    <div class="form-grid two">
      <input placeholder="Your Full Name" />
      <input placeholder="Opponent / Company Name" />
      <input placeholder="Issue Category" />
      <input placeholder="City / State" />
      <input placeholder="Amount Involved" />
      <input placeholder="Preferred Language" />
    </div>
    <textarea rows="6" placeholder="Describe the issue, timeline, legal demand and outcome you want."></textarea>
    <div class="button-row">
      <button class="primary-btn">Generate Notice</button>
      <button class="secondary-btn">Escalate to Advocate</button>
    </div>
  </section>
</main>
</div>
</body>
</html>
