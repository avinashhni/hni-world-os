<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MUSKI AI Core</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    HNIWorldShell.mount({
      currentRoute: '/muski/',
      title: 'MUSKI AI Core',
      breadcrumb: ['HNI WORLD OS', 'Owner Dashboard', 'MUSKI AI'],
      status: 'Master AI Brain Live',
      chips: ['Orchestration Layer', 'Security Boundary'],
      backHref: '/dashboard/',
      backLabel: 'Back to Owner Dashboard',
      contentHtml: `
        <section class="hero-card">
          <h2>MUSKI - Multi-Universal Strategic Knowledge Intelligence</h2>
          <p>MUSKI supervises module-level AI managers, reporting systems, role-safe escalation, and enterprise execution priorities under a controlled governance shell.</p>
          <div class="hero-tags"><span>Master Brain</span><span>Manager Routing</span><span>Enterprise Command</span></div>
        </section>

        <section class="stats-grid four">
          <article class="stat-card"><h4>Brain Status</h4><div class="stat-number">ACTIVE</div><p>Master orchestration shell online.</p></article>
          <article class="stat-card"><h4>Manager AI Layer</h4><div class="stat-number">READY</div><p>Structured upward reporting model.</p></article>
          <article class="stat-card"><h4>Security Boundary</h4><div class="stat-number">LOCKED</div><p>Protected internal logic exposure.</p></article>
          <article class="stat-card"><h4>Next Expansion</h4><div class="stat-number">DEEPEN</div><p>Execution and module actions.</p></article>
        </section>

        <section class="content-grid two">
          <article class="info-card"><h3>Command Intelligence</h3><ul class="info-list"><li>Owner-level OS supervision</li><li>Module intelligence review</li><li>Strategic execution prioritization</li><li>Cross-OS monitoring</li></ul></article>
          <article class="info-card"><h3>Live MUSKI Actions</h3>
            <div class="button-row">
              <button class="primary-btn" onclick="runHealthCheck()">Health Check</button>
              <button class="secondary-btn" onclick="createTask()">Create Task</button>
              <button class="secondary-btn" onclick="dispatchTask()">Dispatch Task</button>
              <button class="secondary-btn" onclick="viewLogs()">View Logs</button>
            </div>
          </article>
        </section>
      `
    });
  </script>
  <script src="./app.js"></script>
</body>
</html>
