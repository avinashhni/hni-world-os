<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE UTT Dashboard</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    HNIWorldShell.mount({
      currentRoute: '/utt/dashboard/',
      activeFamily: 'utt',
      title: 'THE UTT — Travel Command Center',
      breadcrumb: ['HNI WORLD OS', 'Owner Dashboard', 'THE UTT', 'Dashboard'],
      status: 'Travel OS Active',
      chips: ['Enterprise OS Family', 'Read-only Safe Bridge', 'MUSKI Command Ready'],
      backHref: '/dashboard/',
      backLabel: 'Back to Owner Dashboard',
      contentHtml: `
        <section class="hero-card">
          <h2>THE UTT — Universal Travel Technology</h2>
          <p>Booking, supplier integration, CRM workflows, finance visibility, and live telemetry are now routed in the HNI WORLD OS master shell.</p>
          <div class="hero-tags"><span>Booking Engine Status</span><span>Supplier Integration (Expedia, etc.)</span><span>CRM + Leads</span><span>Finance Summary</span><span>Live Activity / Telemetry</span></div>
          <div class="button-row"><button class="primary-btn" onclick="uttOpenBookingEngine()">Open Booking Engine</button></div>
        </section>

        <section class="stats-grid four" id="uttMetricsGrid"></section>

        <section class="content-grid two">
          <article class="info-card">
            <h3>Booking Engine Status</h3>
            <p>Latest booking lifecycle transitions from UttEnterpriseOsService.</p>
            <div class="muski-table-wrap"><table class="muski-table" id="uttBookingsTable"></table></div>
          </article>
          <article class="info-card">
            <h3>Supplier Integration (Expedia, etc.)</h3>
            <p>Active onboarding and API connection states.</p>
            <div class="muski-table-wrap"><table class="muski-table" id="uttSupplierTable"></table></div>
          </article>
        </section>

        <section class="content-grid two">
          <article class="info-card">
            <h3>CRM + Leads</h3>
            <p>Tenant user conversion + servicing visibility.</p>
            <div class="muski-table-wrap"><table class="muski-table" id="uttUsersTable"></table></div>
          </article>
          <article class="info-card">
            <h3>Finance Summary & Live Activity / Telemetry</h3>
            <p>Read-only operational log stream and finance-safe readiness counters.</p>
            <div class="muski-table-wrap"><table class="muski-table" id="uttLogsTable"></table></div>
          </article>
        </section>

        <section class="content-grid two">
          <article class="info-card">
            <h3>MUSKI → THE UTT Commands</h3>
            <p>Role-safe command routing examples wired to UTT module scopes.</p>
            <div class="button-row">
              <button class="secondary-btn" onclick="uttRunCommand('show_bookings')">Show bookings</button>
              <button class="secondary-btn" onclick="uttRunCommand('supplier_status')">Check supplier status</button>
              <button class="secondary-btn" onclick="uttRunCommand('view_revenue')">View revenue</button>
            </div>
            <div class="muski-log-list" id="uttCommandResults"></div>
          </article>
          <article class="info-card">
            <h3>Travel OS Navigation</h3>
            <p>UTT pages registered in the master shell without full page reload behavior change.</p>
            <div class="button-row">
              <a class="primary-btn" href="/utt/dashboard/">Dashboard</a>
              <a class="secondary-btn" href="/utt/bookings/">Bookings</a>
              <a class="secondary-btn" href="/utt/suppliers/">Suppliers</a>
              <a class="secondary-btn" href="/utt/crm/">CRM</a>
              <a class="secondary-btn" href="/utt/finance/">Finance</a>
            </div>
          </article>
        </section>
      `
    });
  </script>
  <script src="/utt/app.js"></script>
  <script>uttBootstrap();</script>
</body>
</html>
