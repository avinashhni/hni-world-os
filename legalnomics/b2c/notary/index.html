<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2C Notary</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
<div class="shell-layout">
<aside class="shell-sidebar">
  <div class="shell-brand-card"><h2>AI LEGALNOMICS OS</h2><p>Local notary and document support request desk.</p></div>
  <div class="shell-nav-group">
    <div class="shell-nav-title">B2C</div>
    <a class="shell-nav-link" href="/legalnomics/b2c">B2C Home</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/notices">Notices</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/replies">Replies</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/consultation">Consultation</a>
    <a class="shell-nav-link active" href="/legalnomics/b2c/notary">Notary</a>
  </div>
</aside>
<main class="shell-main">
  <div class="shell-topbar"><div><h1>Notary Request Desk</h1><p>HNI WORLD OS > Legalnomics > B2C > Notary</p></div><div class="shell-top-actions"><span class="shell-chip">Local Support</span><span class="shell-chip">Affidavit</span><span class="shell-chip">Document Ready</span></div></div>
  <section class="form-card" style="margin:22px;">
    <h3>Request Nearby Notary</h3>
    <div class="form-grid two">
      <input placeholder="Full Name" />
      <input placeholder="Mobile Number" />
      <input placeholder="Document Type" />
      <input placeholder="City / State" />
      <input placeholder="Pincode / Zip" />
      <input placeholder="Preferred Time" />
    </div>
    <textarea rows="5" placeholder="Describe the document support or notary service needed."></textarea>
    <div class="button-row">
      <button class="primary-btn">Find Notary</button>
      <button class="secondary-btn">Save Request</button>
    </div>
  </section>
</main>
</div>
</body>
</html>
