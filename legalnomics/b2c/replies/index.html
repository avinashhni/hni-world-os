<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>B2C Replies</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
<div class="shell-layout">
<aside class="shell-sidebar">
  <div class="shell-brand-card"><h2>AI LEGALNOMICS OS</h2><p>Public rebuttal and reply generation workspace.</p></div>
  <div class="shell-nav-group">
    <div class="shell-nav-title">B2C</div>
    <a class="shell-nav-link" href="/legalnomics/b2c">B2C Home</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/notices">Notices</a>
    <a class="shell-nav-link active" href="/legalnomics/b2c/replies">Replies</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/consultation">Consultation</a>
    <a class="shell-nav-link" href="/legalnomics/b2c/notary">Notary</a>
  </div>
</aside>
<main class="shell-main">
  <div class="shell-topbar"><div><h1>Reply to Notice Engine</h1><p>HNI WORLD OS > Legalnomics > B2C > Replies</p></div><div class="shell-top-actions"><span class="shell-chip">Rebuttal</span><span class="shell-chip">Fact Based</span><span class="shell-chip">Urgent Ready</span></div></div>
  <section class="form-card" style="margin:22px;">
    <h3>Reply Request</h3>
    <div class="form-grid two">
      <input placeholder="Your Full Name" />
      <input placeholder="Sender of Notice" />
      <input placeholder="Notice Category" />
      <input placeholder="Risk Level" />
      <input placeholder="Preferred Language" />
      <input placeholder="City / State" />
    </div>
    <textarea rows="6" placeholder="Paste the notice or explain what it says, what is incorrect, and what your side wants to say."></textarea>
    <div class="button-row">
      <button class="primary-btn">Generate Reply</button>
      <button class="secondary-btn">Upgrade to Advocate Review</button>
    </div>
  </section>
</main>
</div>
</body>
</html>
