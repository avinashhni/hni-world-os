<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE UTT — Admin Control Panel</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    HNIWorldShell.mount({
      currentRoute: '/utt/admin/',
      activeFamily: 'utt',
      title: 'THE UTT — Admin Panel',
      breadcrumb: ['HNI WORLD OS', 'THE UTT', 'Admin'],
      status: 'Core Controls Live',
      chips: ['API monitor', 'Margin toggle', 'Logs viewer'],
      backHref: '/utt/',
      backLabel: 'Back to UTT',
      contentHtml: `
        <section class="hero-card">
          <h2>UTT Admin Control Panel</h2>
          <p id="uttAdminModeStatus"></p>
          <div class="button-row">
            <button class="primary-btn" onclick="uttAdminToggleMode('MODE_A')">Switch MODE A</button>
            <button class="secondary-btn" onclick="uttAdminToggleMode('MODE_B')">Switch MODE B</button>
          </div>
        </section>

        <section class="content-grid two">
          <article class="info-card">
            <h3>API Status Monitor</h3>
            <div class="muski-table-wrap"><table class="muski-table" id="uttAdminApiStatus"></table></div>
          </article>
          <article class="form-card">
            <h3>Margin Configuration</h3>
            <form id="uttAdminMarginForm" class="content-grid two" onsubmit="uttAdminSaveMargin(event)">
              <label>Margin Type<br/>
                <select class="shell-select" name="marginType">
                  <option value="PERCENT">Percent</option>
                  <option value="FIXED">Fixed</option>
                </select>
              </label>
              <label>Dynamic Margin %<br/><input class="shell-select" type="number" name="dynamicMarginPct" min="0" step="1" /></label>
              <label>Fixed Margin Amount<br/><input class="shell-select" type="number" name="fixedMarginAmount" min="0" step="1" /></label>
              <label>Mode A Minimal Margin %<br/><input class="shell-select" type="number" name="minimalMarginPct" min="0" step="1" /></label>
              <div class="button-row"><button class="primary-btn" type="submit">Save Margin Config</button></div>
            </form>
          </article>
        </section>

        <section class="content-grid two">
          <article class="info-card">
            <h3>Booking Logs Viewer</h3>
            <div class="muski-table-wrap"><table class="muski-table" id="uttAdminBookingLogs"></table></div>
          </article>
          <article class="info-card">
            <h3>Payment + Invoice Logs</h3>
            <div class="muski-table-wrap"><table class="muski-table" id="uttAdminFinanceLogs"></table></div>
          </article>
        </section>
      `
    });
  </script>
  <script src="/utt/core-platform.js"></script>
  <script>uttRenderAdmin();</script>
</body>
</html>
