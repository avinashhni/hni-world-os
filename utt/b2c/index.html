<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE UTT B2C — Hotel Search</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    HNIWorldShell.mount({
      currentRoute: '/utt/b2c/',
      activeFamily: 'utt',
      title: 'THE UTT — B2C Hotel Search',
      breadcrumb: ['HNI WORLD OS', 'THE UTT', 'B2C', 'Landing'],
      status: 'UTT Core Build Live',
      chips: ['Module 1-5 enabled', 'Clean B2C flow'],
      backHref: '/utt/',
      backLabel: 'Back to UTT',
      contentHtml: `
        <section class="hero-card">
          <h2>B2C Landing — Hotel Search</h2>
          <p>Search hotels by location, dates, and pax. Unified supplier engine fetches Expedia, Hotelbeds, and WebBeds.</p>
        </section>
        <section class="form-card">
          <h3>Start Search</h3>
          <form class="content-grid two" onsubmit="uttCoreSubmitSearch(event)">
            <label>Location<br/><input class="shell-select" name="location" required placeholder="New York" /></label>
            <label>Pax<br/><input class="shell-select" type="number" min="1" name="pax" value="2" required /></label>
            <label>Check-in<br/><input class="shell-select" type="date" name="checkIn" required /></label>
            <label>Check-out<br/><input class="shell-select" type="date" name="checkOut" required /></label>
            <div class="button-row"><button class="primary-btn" type="submit">Search Hotels</button></div>
          </form>
        </section>
      `
    });
  </script>
  <script src="/utt/core-platform.js"></script>
</body>
</html>
