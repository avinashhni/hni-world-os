<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE UTT Finance</title>
  <link rel="stylesheet" href="/dashboard/shared-shell.css" />
</head>
<body>
  <div id="app"></div>
  <script src="/dashboard/master-shell.js"></script>
  <script>
    HNIWorldShell.mount({
      currentRoute: '/utt/finance/',
      activeFamily: 'utt',
      title: 'THE UTT — Finance Summary',
      breadcrumb: ['HNI WORLD OS', 'THE UTT', 'Finance'],
      status: 'Finance Telemetry Live',
      chips: ['Revenue visibility', 'Read-only mode'],
      backHref: '/utt/dashboard/',
      backLabel: 'Back to UTT Dashboard',
      contentHtml: `
        <section class="hero-card"><h2>Finance Summary + Live Activity / Telemetry</h2><p>Revenue-oriented logs and command-level readouts under safe shell controls.</p></section>
        <section class="content-grid two">
          <article class="info-card"><h3>Finance / Audit Logs</h3><div class="muski-table-wrap"><table class="muski-table" id="uttLogsTable"></table></div></article>
          <article class="info-card"><h3>MUSKI Commands</h3><div class="button-row"><button class="secondary-btn" onclick="uttRunCommand('show_bookings')">Show bookings</button><button class="secondary-btn" onclick="uttRunCommand('supplier_status')">Check supplier status</button><button class="secondary-btn" onclick="uttRunCommand('view_revenue')">View revenue</button></div><div class="muski-log-list" id="uttCommandResults"></div></article>
        </section>
      `
    });
  </script>
  <script src="/utt/app.js"></script>
  <script>uttBootstrap();</script>
</body>
</html>
